version: "3.9"

services:
  db:
    image: postgres:15
    container_name: db_proyecto2
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - ./db/ddl.sql:/docker-entrypoint-initdb.d/ddl.sql
      - ./db/registros.sql:/docker-entrypoint-initdb.d/registros.sql

  backend:
      build: ./backend
      container_name: bck_proyecto2
      restart: always
      ports:
        - "8000:8000"
      environment:
        DB_HOST: db
        DB_PORT: 5432
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
      depends_on:
        - db